document.getElementById('closeBtn').onclick=()=>modal.style.display='none'; modal.addEventListener('click',e=>{ if(e.target===modal) modal.style.display='none'; }); function wxClass(wx){ return {'金':'wx-jin','木':'wx-mu','水':'wx-shui','火':'wx-huo','土':'wx-tu'}[wx] || ''; } function wxOfChar(ch){ return (ganMeta[ch]||zhiMeta[ch]||['未知',''])[0]; } function wxSpan(ch){ const wx = wxOfChar(ch); return `<span class="${wxClass(wx)}">${ch}</span>`; } function baziHtml(text){ return text.split(' ').map(p=>`<span class="bazi-piece">${wxSpan(p[0])}${wxSpan(p[1])}</span>`).join(''); } function pillarHtml(label,pillar){ const gan=pillar[0], zhi=pillar[1], g=ganMeta[gan], z=zhiMeta[zhi], c=(hiddenMap[zhi]||[]).map(wxSpan).join('、'); return `<div class="pillar"><h3>${label}<br><span class="pillar-main">${wxSpan(gan)}${wxSpan(zhi)}</span></h3><div class="meta-line"><span class="label-mini">天干</span><span class="meta-value">${wxSpan(gan)}<span class="wx-sub ${wxClass(g[0])}">（${g[1]}${g[0]}）</span></span></div><div class="meta-line"><span class="label-mini">地支</span><span class="meta-value">${wxSpan(zhi)}<span class="wx-sub ${wxClass(z[0])}">（${z[1]}${z[0]}）</span></span></div><div class="meta-line"><span class="label-mini">藏干</span><span class="meta-value canggan">${c}</span></div></div>`; } function hiddenSection(r){ return `<div class="section-bar">藏干</div><div class="hidden-grid">${pillarHtml('年柱',r.year)}${pillarHtml('月柱',r.month)}${pillarHtml('日柱',r.day)}${pillarHtml('时柱',r.hour)}</div>`; } function elementBoxes(r,title='八字五行'){ return `<div class="section-bar">${title}</div><div class="element-grid"><div class="element-box"><div class="element-label">金</div><div class="element-num element-jin">${r.jin}</div></div><div class="element-box"><div class="element-label">木</div><div class="element-num element-mu">${r.mu}</div></div><div class="element-box"><div class="element-label">水</div><div class="element-num element-shui">${r.shui}</div></div><div class="element-box"><div class="element-label">火</div><div class="element-num element-huo">${r.huo}</div></div><div class="element-box"><div class="element-label">土</div><div class="element-num element-tu">${r.tu}</div></div></div>`; } function hiddenFiveCounts(r){ const pillars=[r.year,r.month,r.day,r.hour]; const out={金:0,木:0,水:0,火:0,土:0}; let total=0; pillars.forEach(p=>{ const zhi=p[1]; (hiddenMap[zhi]||[]).forEach(g=>{ const wx=wxOfChar(g); if(out[wx]!==undefined){ out[wx]++; total++; } }); }); out.total = total; return out; } function hiddenElementBoxes(r){ const h=hiddenFiveCounts(r); return `<div class="section-bar">藏干五行 <span class="count-note">(${h.total})</span></div><div class="element-grid"><div class="element-box"><div class="element-label">金</div><div class="element-num element-jin">${h['金']}</div></div><div class="element-box"><div class="element-label">木</div><div class="element-num element-mu">${h['木']}</div></div><div class="element-box"><div class="element-label">水</div><div class="element-num element-shui">${h['水']}</div></div><div class="element-box"><div class="element-label">火</div><div class="element-num element-huo">${h['火']}</div></div><div class="element-box"><div class="element-label">土</div><div class="element-num element-tu">${h['土']}</div></div></div>`; } function totalElementBoxes(r){ const h=hiddenFiveCounts(r); const total = r.jin+r.mu+r.shui+r.huo+r.tu+h.total; return `<div class="section-bar">总五行 <span class="count-note">(${total})</span></div><div class="element-grid"><div class="element-box"><div class="element-label">金</div><div class="element-num element-jin">${r.jin + h['金']}</div></div><div class="element-box"><div class="element-label">木</div><div class="element-num element-mu">${r.mu + h['木']}</div></div><div class="element-box"><div class="element-label">水</div><div class="element-num element-shui">${r.shui + h['水']}</div></div><div class="element-box"><div class="element-label">火</div><div class="element-num element-huo">${r.huo + h['火']}</div></div><div class="element-box"><div class="element-label">土</div><div class="element-num element-tu">${r.tu + h['土']}</div></div></div>`; } function renderRows(list){ tbody.innerHTML=list.map(r=>`<tr id="row-${r.index}"><td>${r.index}</td><td>${r.date}</td><td>${r.time}</td><td>${r.shichen}</td><td>${r.bazi}</td><td>${r.pattern}</td><td><div class="row-actions"><button class="btn" onclick="openModal('${r.pattern}')">推荐名字</button><a class="btn" href="names.html#${encodeURIComponent(r.pattern)}">打开名字页</a></div></td></tr>`).join(''); cards.innerHTML=list.map(r=>`<article class="card" id="mrow-${r.index}" style="background-image:${patternBg[r.pattern]}"><div class="pattern-main"><div class="pattern-corner pc-tl"><span class="badge">第${r.index}组</span></div><div class="pattern-center" style="${patternStyle[r.pattern]}">${r.pattern}</div></div><div class="small" style="margin-top:14px;font-weight:700;font-size:15px;text-align:center;letter-spacing:.3px">${r.date} · ${r.time} · ${r.shichen}</div><div class="line" style="margin-top:16px"><span class="chip">年柱：${r.year}</span><span class="chip">月柱：${r.month}</span><span class="chip">日柱：${r.day}</span><span class="chip">时柱：${r.hour}</span></div><div class="bazi-line"><b>八字：</b>${baziHtml(r.bazi)}</div>${elementBoxes(r)}${hiddenSection(r)}${hiddenElementBoxes(r)}${totalElementBoxes(r)}<div class="bottom-actions"><button class="btn" onclick="openModal('${r.pattern}')">推荐名字</button><a class="btn" href="names.html#${encodeURIComponent(r.pattern)}">打开名字页</a></div></article>`).join(''); applyView(); } function applyView(){ const mobile = window.innerWidth<=720; const real = view.value==='auto' ? (mobile?'card':'table') : view.value; document.getElementById('tableWrap').style.display = real==='table'?'block':'none'; cards.style.display = real==='card'?'grid':'none'; } function apply(){ let list = rows.filter(r=>{ const q=search.value.trim(); return (!q || (`${r.index} ${r.date} ${r.bazi} ${r.pattern}`).includes(q)) && (!pattern.value ||
